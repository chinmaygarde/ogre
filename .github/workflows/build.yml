name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  format:
    name: Check Formatting
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v6

    - name: Install clang-format-22
      run: |
        wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
        echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-22 main" | sudo tee /etc/apt/sources.list.d/llvm.list
        sudo apt-get update -q
        sudo apt-get install -y clang-format-22
        sudo ln -sf /usr/bin/clang-format-22 /usr/local/bin/clang-format

    - name: Setup Just
      uses: extractions/setup-just@v3

    - name: Check clang-format
      run: just --no-deps format-check

  build:
    name: Build with CMake
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-26
    steps:
    - uses: actions/checkout@v6

    - name: Setup CCache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: ${{ github.job }}-${{ runner.os }}

    - name: Setup Just
      uses: extractions/setup-just@v3

    - name: Setup VCPKG
      uses: lukka/run-vcpkg@v11
      env:
        VCPKG_BINARY_SOURCES: default,rw

    - name: Setup VCPKG Cache
      uses: actions/cache@v5
      with:
        path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
        key: ${{ runner.os }}-vcpkg-binary-cache-${{ hashFiles('vcpkg*.json') }}
        restore-keys: |
            ${{ runner.os }}-vcpkg-binary-cache-

    - name: Install Vulkan Runtime (Linux only)
      if: matrix.os == 'ubuntu-24.04'
      run: sudo apt-get install -y libvulkan1 mesa-vulkan-drivers

    - name: Pull Dependencies
      run: just --no-deps sync

    - name: Generate Build Directory
      run: just --no-deps setup

    - name: Build with CMake
      run: just --no-deps build

    - name: Test
      run: just --no-deps test
